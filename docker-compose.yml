version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: automechanic-db
    restart: always
    environment:
      POSTGRES_DB: automechanic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Backend Service (Spring Boot API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: automechanic-backend
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=automechanic
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=9a6ZpG5v8M1wK4yB7xQ3rN8tP2uV5sC1jO6dE9fG3hI0kL5mN2oP8qR1sT4uV7wX
      - JWT_EXPIRATION=86400000

  # Frontend Service (Angular + Nginx proxy)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: automechanic-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
