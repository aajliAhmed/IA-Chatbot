spring:
  profiles:
    active: dev
  application:
    name: automechanic-api

---
# Development Profile (H2 In-Memory)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:automechanicdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Security / JWT Configuration for Dev
security:
  jwt:
    secret: 9a6ZpG5v8M1wK4yB7xQ3rN8tP2uV5sC1jO6dE9fG3hI0kL5mN2oP8qR1sT4uV7wX
    expiration: 86400000 # 24 hours in milliseconds

server:
  port: 8080

---
# Production Profile (PostgreSQL Docker)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:automechanic}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false

security:
  jwt:
    secret: ${JWT_SECRET:9a6ZpG5v8M1wK4yB7xQ3rN8tP2uV5sC1jO6dE9fG3hI0kL5mN2oP8qR1sT4uV7wX}
    expiration: 86400000 # 24 hours

server:
  port: 8080
